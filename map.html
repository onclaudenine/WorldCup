<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){var s=localStorage.getItem('dallas2026-theme');var d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;if(s?s==='light':!d)document.documentElement.classList.add('light');})();
</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Dallas 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.map-shell{display:grid;grid-template-columns:280px 1fr;height:600px;border:1px solid var(--border);overflow:hidden}
.map-sidebar{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .25s}
.filter-head{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-family:var(--fh);font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.cat-btns{display:flex;flex-direction:column;flex-shrink:0;border-bottom:1px solid var(--border)}
.cat-btn{display:flex;align-items:center;gap:10px;padding:.6rem 1rem;cursor:pointer;border:none;background:none;color:var(--muted);width:100%;text-align:left;transition:all .15s;border-left:3px solid transparent;font-family:var(--fh);font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.cat-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
.cat-btn.active{background:rgba(191,10,48,.07);color:var(--text);border-left-color:var(--red)}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.places-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.place-item{padding:.85rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.place-item:hover,.place-item.sel{background:rgba(191,10,48,.06)}
.pi-name{font-family:var(--fh);font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--text);margin-bottom:2px}
.pi-type{font-size:.68rem;color:var(--muted);font-weight:300;text-transform:capitalize}
.map-area{position:relative;overflow:hidden;flex:1}
.map-frame{width:100%;height:100%;border:none;display:block}
/* Info panel slides up from bottom of map */
.info-panel{position:absolute;bottom:-100%;left:0;right:0;background:var(--card);border-top:1px solid var(--border2);padding:1.25rem 1.5rem 1.5rem;transition:bottom .25s ease;z-index:10}
.info-panel.open{bottom:0}
.ip-close{position:absolute;top:.75rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;line-height:1;padding:4px 8px}
.ip-close:hover{color:var(--text)}
.ip-cat{font-family:var(--fh);font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.ip-name{font-family:var(--fh);font-size:1.3rem;font-weight:900;text-transform:uppercase;line-height:1;margin-bottom:.5rem;color:var(--text)}
.ip-desc{font-size:.82rem;color:var(--muted);line-height:1.65;font-weight:300;margin-bottom:1rem}
.ip-actions{display:flex;gap:8px;flex-wrap:wrap}
/* Zoom controls */
.zoom-btns{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:2px;z-index:5}
.zoom-btn{width:32px;height:32px;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1}
.zoom-btn:hover{background:var(--card2)}
/* SVG map */
.map-svg-wrap{width:100%;height:100%;overflow:hidden;position:relative}
#map-svg{width:100%;height:100%;cursor:grab;user-select:none}
#map-svg:active{cursor:grabbing}
/* Mobile */
@media(max-width:640px){
  .map-shell{grid-template-columns:1fr;height:auto}
  .map-sidebar{max-height:220px;border-right:none;border-bottom:1px solid var(--border)}
  .map-area{height:420px}
}
</style>
</head>
<body>

  <p style="font-size:.82rem;color:var(--muted);font-weight:300;max-width:560px;line-height:1.65">Stadium, transit stops, hotels, fan zones, and top restaurants. Click any pin for details. Use +/− or scroll to zoom.</p>
</div>

    <!-- Zoom controls -->

  </div>
</div>

<script>
renderNav(); renderFooter(); renderDisclosure(); initLang();

const PLACES = [
  {id:1,  name:'AT&T Stadium',         cat:'stadium', color:'#BF0A30', r:12,

  {id:4,  name:'Fort Worth TRE Station',cat:'transit', color:'#4CAF50', r:7,

  {id:14, name:'Deep Ellum Fan Walk',   cat:'fanzone', color:'#9C27B0', r:7,
   desc:'Dallas\'s arts and bar district — alive with World Cup fans all tournament long.',
   link:'https://maps.google.com/?q=Deep+Ellum+Dallas+TX', href:'neighborhoods/deep-ellum.html',
   tips:'Best nightlife in Dallas. Bars stay open until 2am. Grab a post-match drink here.',
   x:495, y:222},
];

// ── CATEGORY LABELS ──────────────────────────────────────────
const CAT_LABELS = {
  stadium:'Stadium', transit:'Transit', food:'Food & Drink',
  hotel:'Hotel', fanzone:'Fan Zone'
};

let activeCat = 'all';
let selectedId = null;

// ── PAN + ZOOM STATE ─────────────────────────────────────────
let scale = 1, tx = 0, ty = 0;
const MIN_SCALE = 0.7, MAX_SCALE = 4;

function applyTransform() {
  document.getElementById('map-markers').style.transform =
    `translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('map-markers').style.transformOrigin = '0 0';
  // Also transform background elements
  const svgEl = document.getElementById('map-svg');
  // We transform the inner group, SVG viewBox stays fixed
}

function clampTranslation() {
  // Keep map from panning too far out of view
  const w = document.getElementById('map-area').offsetWidth;
  const h = document.getElementById('map-area').offsetHeight;
  const svgW = 700 * scale, svgH = 540 * scale;
  tx = Math.min(0, Math.max(tx, w - svgW));
  ty = Math.min(0, Math.max(ty, h - svgH));
  if (scale <= 1) { tx = 0; ty = 0; }
}

function zoom(factor, cx, cy) {
  const svgEl = document.getElementById('map-svg');
  const rect = svgEl.getBoundingClientRect();
  // cx, cy in SVG pixel space
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
  if (newScale === scale) return;
  // Zoom towards the center point
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale;
  clampTranslation();
  updateMarkerTransform();
}

function resetView() {
  scale = 1; tx = 0; ty = 0;
  updateMarkerTransform();
}

function updateMarkerTransform() {
  const g = document.getElementById('map-markers');
  g.setAttribute('transform', `translate(${tx},${ty}) scale(${scale})`);
}

// ── RENDER MAP ───────────────────────────────────────────────
function renderMap() {
  const g = document.getElementById('map-markers');
  const list = document.getElementById('places-list');
  g.innerHTML = '';
  list.innerHTML = '';

  const visible = PLACES.filter(p => activeCat === 'all' || p.cat === activeCat);

  visible.forEach(p => {
    // Stadium label above pin
    if (p.cat === 'stadium') {
      const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x', p.x); lbl.setAttribute('y', p.y - p.r - 6);
      lbl.setAttribute('text-anchor','middle');
      lbl.setAttribute('fill', p.color);
      lbl.setAttribute('font-family',"'Barlow Condensed'");
      lbl.setAttribute('font-size','9'); lbl.setAttribute('font-weight','700');
      lbl.textContent = 'AT&T STADIUM';
      g.appendChild(lbl);
    }

    // Pin circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', p.x); circle.setAttribute('cy', p.y);
    circle.setAttribute('r', p.r); circle.setAttribute('fill', p.color);
    circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', '1.5');
    circle.style.cursor = 'pointer';
    circle.style.transition = 'r .15s';
    circle.dataset.id = p.id;

    // Pulse ring for stadium
    if (p.cat === 'stadium') {
      const pulse = document.createElementNS('http://www.w3.org/2000/svg','circle');
      pulse.setAttribute('cx', p.x); pulse.setAttribute('cy', p.y);
      pulse.setAttribute('r', p.r + 4); pulse.setAttribute('fill','none');
      pulse.setAttribute('stroke', p.color); pulse.setAttribute('stroke-width','1.5');
      pulse.setAttribute('opacity','0.4');
      g.appendChild(pulse);
    }

    circle.addEventListener('mouseenter', () => circle.setAttribute('r', p.r + 3));
    circle.addEventListener('mouseleave', () => {
      if (selectedId !== p.id) circle.setAttribute('r', p.r);
    });
    circle.addEventListener('click', (e) => {
      e.stopPropagation();
      selectPlace(p);
      // highlight pin
      document.querySelectorAll('#map-markers circle').forEach(c => {
        const pid = +c.dataset.id;
        const place = PLACES.find(pl => pl.id === pid);
        if (place) c.setAttribute('r', pid === p.id ? place.r + 4 : place.r);
      });
    });
    g.appendChild(circle);

    // Sidebar item
    const div = document.createElement('div');
    div.className = 'place-item' + (selectedId === p.id ? ' sel' : '');
    div.dataset.id = p.id;
    div.innerHTML = `<div class="pi-name">${p.name}</div><div class="pi-type">${CAT_LABELS[p.cat] || p.cat}</div>`;
    div.addEventListener('click', () => selectPlace(p));
    list.appendChild(div);
  });

  updateMarkerTransform();
}

function selectPlace(p) {
  selectedId = p.id;

  // Update sidebar highlight
  document.querySelectorAll('.place-item').forEach(el => {
    el.classList.toggle('sel', +el.dataset.id === p.id);
  });

  // Build info panel
  document.getElementById('ip-cat').textContent = CAT_LABELS[p.cat] || p.cat;
  document.getElementById('ip-name').textContent = p.name;
  document.getElementById('ip-desc').innerHTML = p.desc +
    (p.tips ? `<br><br><strong style="color:var(--white);font-size:.75rem">💡 Tip:</strong> <span style="font-size:.78rem">${p.tips}</span>` : '');

  const actions = document.getElementById('ip-actions');
  actions.innerHTML = '';

  if (p.href) {
    const btn = document.createElement('a');
    btn.href = p.href; btn.className = 'btn-prim';
    btn.style.cssText = 'font-size:.72rem;padding:8px 18px';
    btn.textContent = 'View Details →';
    actions.appendChild(btn);
  }

  const mapBtn = document.createElement('a');
  mapBtn.href = p.link; mapBtn.target = '_blank'; mapBtn.rel = 'noopener';
  mapBtn.className = 'btn-ghost';
  mapBtn.style.cssText = 'font-size:.72rem;padding:8px 18px';
  mapBtn.textContent = 'Google Maps ↗';
  actions.appendChild(mapBtn);

  document.getElementById('info-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  selectedId = null;
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('sel'));
  document.querySelectorAll('#map-markers circle').forEach(c => {
    const p = PLACES.find(pl => pl.id === +c.dataset.id);
    if (p) c.setAttribute('r', p.r);
  });
}

document.getElementById('ip-close').addEventListener('click', closePanel);
document.getElementById('map-area').addEventListener('click', (e) => {
  if (!e.target.closest('#info-panel') && !e.target.closest('#map-markers')) closePanel();
});

// ── CATEGORY FILTER ──────────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeCat = btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    closePanel();
    renderMap();
  });
});

// ── ZOOM CONTROLS ────────────────────────────────────────────
const svgEl = document.getElementById('map-svg');
document.getElementById('zoom-in').addEventListener('click', () => {
  const r = svgEl.getBoundingClientRect();
  zoom(1.4, r.width/2, r.height/2);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  const r = svgEl.getBoundingClientRect();
  zoom(1/1.4, r.width/2, r.height/2);
});
document.getElementById('zoom-reset').addEventListener('click', resetView);

// Mouse wheel zoom
svgEl.addEventListener('wheel', e => {
  e.preventDefault();
  const r = svgEl.getBoundingClientRect();
  zoom(e.deltaY < 0 ? 1.15 : 1/1.15, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

// Pan (drag)
let dragging = false, dragStartX, dragStartY, dragTx, dragTy;
svgEl.addEventListener('mousedown', e => {
  if (e.target.closest('#map-markers circle')) return;
  dragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
  dragTx = tx; dragTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = dragTx + (e.clientX - dragStartX);
  ty = dragTy + (e.clientY - dragStartY);
  clampTranslation();
  updateMarkerTransform();
});
window.addEventListener('mouseup', () => dragging = false);

// Touch pinch + pan
let lastTouchDist = null, lastTouchX, lastTouchY;
svgEl.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
  } else if (e.touches.length === 1) {
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    dragTx = tx; dragTy = ty;
  }
}, { passive: true });
svgEl.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist) {
      const r = svgEl.getBoundingClientRect();
      const cx = (e.touches[0].clientX + e.touches[1].clientX)/2 - r.left;
      const cy = (e.touches[0].clientY + e.touches[1].clientY)/2 - r.top;
      zoom(dist / lastTouchDist, cx, cy);
    }
    lastTouchDist = dist;
  } else if (e.touches.length === 1) {
    tx = dragTx + (e.touches[0].clientX - dragStartX);
    ty = dragTy + (e.touches[0].clientY - dragStartY);
    clampTranslation();
    updateMarkerTransform();
  }
}, { passive: false });
svgEl.addEventListener('touchend', () => { lastTouchDist = null; });

// ── THEME SYNC ───────────────────────────────────────────────
function applyTheme() {
  const light = document.documentElement.classList.contains('light');
  const bg = document.getElementById('map-bg');
  if (bg) bg.setAttribute('fill', light ? '#f0ede5' : '#0e1420');
  // Road fills
  document.querySelectorAll('#map-svg rect:not(#map-bg)').forEach(r => {
    r.setAttribute('fill', light ? '#d4cfc4' : '#1e2d45');
  });
  // Road lines
  document.querySelectorAll('#map-svg line').forEach(l => {
    const s = l.getAttribute('stroke');
    if (s === '#e0dbd0' || s === '#c8c2b8') l.setAttribute('stroke', light ? '#e0dbd0' : '#162238');
  });
  // Text
  document.querySelectorAll('#map-svg text').forEach(el => {
    const fill = el.getAttribute('fill');
    if (fill === '#8a8070' || fill === '#aaa090') {
      el.setAttribute('fill', light ? '#8a8070' : '#4a6088');
    }
    if (fill === '#253060') el.setAttribute('fill', light ? '#8a8070' : '#4a6088');
  });
}

const themeObserver = new MutationObserver(applyTheme);
themeObserver.observe(document.documentElement, {attributes:true, attributeFilter:['class']});
applyTheme(); // run immediately

// ── LANG ─────────────────────────────────────────────────────
function updateMapLang() {
  const ids = {
    'map-label':'map_label','map-title':'map_title',
    'map-cat-all':'map_all','map-cat-stadium':'map_stadium',
    'map-cat-transit':'map_transit','map-cat-food':'map_food',
    'map-cat-hotels':'map_hotels','map-cat-fanzones':'map_fanzones',
  };
  Object.entries(ids).forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.textContent=t(key);});
}
document.addEventListener('langchange', updateMapLang);
if (currentLang !== 'en') updateMapLang();

renderMap();
</script>
